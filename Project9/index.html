<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="shortcut icon" href="fav.png" type="image/png">
  </head>
  <body>
    <div class="main-container">
    <div class="meta-container">
        <h1 class="main-heading">Get in Touch</h1>
        <p class="sub-heading">Fill out the form below to contact us</p>
    </div>
      <form id="contact-form">
        <div class="column-fields-container">
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Name"
              required
            />
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Email"
              required
            />
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-phone"></i>
            <input
              type="tel"
              name="phone"
              id="phone"
              placeholder="Phone (Optional)"
            />
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-tag"></i>
            <input
              type="text"
              name="subject"
              id="subject"
              placeholder="Subject"
              required
            />
          </div>
        </div>
        <div class="text-field-container">
          <div class="input-wrapper">
            <i class="fa-solid fa-message"></i>
            <textarea
              name="message"
              id="message"
              placeholder="Your Message"
            ></textarea>
          </div>
        </div>
        <button type="submit">
          Send Message <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
      <div class="footer-info-container">
        <div class="footer-wrapper">
          <i class="fa-solid fa-location-dot"></i>
          <p id="location">123 Main Street, city, Country</p>
        </div>
        <div class="footer-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <p id="mail">contact@gmail.com</p>
        </div>
        <div class="footer-wrapper">
          <i class="fa-solid fa-phone"></i>
          <p id="phone-no">+12345678</p>
        </div>
      </div>
    </div>
  </body>
</html>
