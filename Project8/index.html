<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do Application</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/png" href="todo.png" />
  </head>
  <body>
    <div class="main-container">
      <div class="main-heading">
        <p class="heading-container">
          <i class="fa-solid fa-check heading-icon"></i> My Tasks
        </p>
        <p class="date-time">Monday</p>
      </div>
      <div class="input-container">
        <input
          type="text"
          name="task-input"
          id="task-input"
          placeholder="What do you need to do?"
        />
        <button type="submit" id="submit-btn">
          <i class="fa-solid fa-plus plus-icon"></i>
        </button>
      </div>
      <div class="list-container">
        <div class="filter-container">
          <button class="tab active" id="all-btn">All</button>
          <button class="tab" id="active-btn">Active</button>
          <button class="tab" id="complete-btn">Completed</button>
        </div>
        <div class="list-value-container">
          <div class="default-icon">
            <i class="fa-solid fa-clipboard-list clipboard-icon"></i>
            <p>No Task here</p>
          </div>
          <div class="list-values">
            <!-- will show the list -->
          </div>  
        </div>
      </div>
      <div class="footer-detail-container">
        <p class="item-number">
          <span id="item-count-span">0</span> item(s) left
        </p>
        <button class="clear-btn" id="clear-btn">clear completed</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
