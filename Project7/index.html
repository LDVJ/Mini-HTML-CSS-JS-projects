<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main-container">
        <h1>Password Generator</h1>
        <div class="password-field">
            <input type="text" name="password" id="password" readonly>
            <i class="fa-regular fa-copy" id="copy-btn" title="Copy to clipboard"></i>
            <!-- <i class="fa-solid fa-check-double" id="copy-btn" title="Copied"></i> -->
        </div>
        <div class="modifications-option">
            <div class="option-container">
                <label for="password-length">Password Length</label>
                <div class="range-container">
                    <input type="range" name="password-length" id="password-length" min="6" max="24" value="12">
                    <span id="range-value">12</span> 
                </div>
            </div>
            <div class="option-container">
                <label for="upperCase">Inlcude Uppercase</label>
                <input type="checkbox" name="upperCase" id="upperCase" checked>
            </div>

            <div class="option-container">
                <label for="lowerCase">Inlcude lowercase</label>
                <input type="checkbox" name="lowerCase" id="lowerCase" checked>
            </div>

            <div class="option-container">
                <label for="symbols">Inlcude Symbols</label>
                <input type="checkbox" name="symbols" id="symbols" checked>
            </div>

        </div>
        <button type="button" id="generate-btn">
            <i class="fa-solid fa-key"></i>
            Generate Password
        </button>
        <div class="strength-container">
            <div class="headings">
                <p id="password-strength">Password Strength:</p>
                <p id="strength">Strong</p>
            </div>
            <div class="strength-meter">
                <div class="strength-bar"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
