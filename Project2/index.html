<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Pallete Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Color Pallete Generator</h1>
      <button id="generate-btn">
        <i class="fas fa-sync-alt"></i> Generate Pallete
      </button>
      <div class="pallete-container">
        <div class="color-box">
            <div class="color" style="background-color: #34ff35;"></div>
            <div class="color-info">
                <span class="hex-value">
                    #34FF35
                </span>  
                <i class="fa-solid fa-copy copy-btn" style="color: #34ff35;" title="Copy to Clipboard"></i>
            </div>
        </div>
        <div class="color-box">
            <div class="color" style="background-color: #52ccff;"></div>
                <div class="color-info">
                <span class="hex-value">
                    #52CCFF
                </span>  
                <i class="fa-solid fa-copy copy-btn" style="color: #52ccff;" title="Copy to Clipboard"></i>
            </div>
        </div>
        <div class="color-box">
            <div class="color" style="background-color: #FF22EE;"></div>
            <div class="color-info">
                <span class="hex-value">
                    #FF22EE
                </span>  
                <i class="fa-solid fa-copy copy-btn" style="color: #FF22EE;" title="Copy to Clipboard"></i>
            </div>
        </div>
        <div class="color-box">
            <div class="color" style="background-color: #EE112A;"></div>
            <div class="color-info">
                <span class="hex-value">
                    #EE112A
                </span>  
                <i class="fa-solid fa-copy copy-btn" style="color: #EE112A;" title="Copy to Clipboard"></i>
            </div>
        </div>
        <div class="color-box">
            <div class="color" style="background-color: #AA99FF;"></div>
            <div class="color-info">
                <span class="hex-value">
                    #AA99FF
                </span>  
                <i class="fa-solid fa-copy copy-btn" style="color: #AA99FF;" title="Copy to Clipboard"></i>
            </div>
        </div>
      </div>
    </div>
    <script src="script_self.js"></script>  
  </body>
</html>
