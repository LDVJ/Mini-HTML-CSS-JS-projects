<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Quiz Game</title>
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>
      <div class="screen" id="question-screen"> 
        <div class="quiz-header">
          <h2 id="question-text">Question</h2>
          <div class="question-info">
            <p>
              Question <span id="current-question-number">1</span> of
              <span id="total-question-number">5</span>
            </p>
            <p>Score: <span id="marks-scored">0</span></p>
          </div>
        </div>
        <div id="quiz-options" class="options-container ">
            <!-- Options button will be added with js -->
        </div>
        <div class="progress-bar">
            <div id="progress" class="progress-container"></div>
        </div>
      </div>
      <div class="screen" id="result-screen">
        <h1>Quiz Result</h1>
        <div class="result-info"><p>You Scored <span id="final-score">0</span> out of <span id="total-marks">5</span></p>
            <p id="result-message">Thankyou</p>
        </div>
            <!-- <div id="result-message">Thankyou</div> -->
            <button id="restart-btn">Restart Quiz</button>
        </div>
      </div>
    </div>
    <script src="script_test.js"></script>
  </body>
</html>
