<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h3>Sample Kanban Board</h3>
        <div class="boards">
            <div class="board" id="to-do">
                <h2>To Do</h2>
                <div class="cards-container">
                    <div class="card" draggable="true">Code Debug1</div>
                    
                </div>
            </div>
            <div class="board" id="processing">
                <h2>Processing</h2>
                <div class="cards-container">
                    <div class="card" draggable="true">Youtube Short Upload</div>
                </div>
            </div>
            <div class="board" id="complete">
                <h2>Complete</h2>
                <div class="cards-container">
                    <div class="card" draggable="true">New Meeting</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
